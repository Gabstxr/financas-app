name: financas_app
description: Aplicativo de finanças pessoais para o mercado brasileiro.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^4.9.0
  firebase_auth: ^6.5.1
  cloud_firestore: ^6.4.1
  firebase_analytics: ^12.4.1
  firebase_crashlytics: ^5.2.2
  google_sign_in: ^7.2.0

  # State Management
  flutter_bloc: ^9.1.1
  equatable: ^2.0.5

  # Dependency Injection
  get_it: ^9.2.1
  injectable: ^3.0.0

  # Navigation
  go_router: ^17.2.3

  # Local Storage
  hive_flutter: ^1.1.0

  # Code Generation / Immutable classes
  freezed_annotation: ^3.1.0
  json_annotation: ^4.9.0

  # UI
  fl_chart: ^1.2.0
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # Utils
  intl: ^0.20.2
  connectivity_plus: ^7.1.1
  dartz: ^0.10.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  freezed: ^3.2.6-dev.1
  json_serializable: ^6.8.0
  injectable_generator: ^3.0.2
  bloc_test: ^10.0.0
  mocktail: ^1.0.4
  fake_cloud_firestore: ^4.1.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
          weight: 400
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
